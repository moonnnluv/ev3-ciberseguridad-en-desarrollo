version: "3.8"

services:
  app:
    build: .
    container_name: ep3-flask-app
    ports:
      - "5000:5000"

  prometheus:
    image: prom/prometheus:latest
    container_name: ep3-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: ep3-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
